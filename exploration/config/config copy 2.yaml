# Hydra configuration for Hessian training pipeline

# Model
model_name: "EleutherAI/pythia-70m" #"roneneldan/TinyStories-8M" #"EleutherAI/pythia-70m"  or "roneneldan/TinyStories-8M"
model_id: "pythia70m"  #"tinystories" or "pythia70m"  # Short name for folder naming
train_from_scratch: true  # If true, use random weights; if false, use pretrained

# Dataset
dataset_name: "lm1b" #"lm1b" # or "tinystories"
dataset_cache_dir: "/mfs1/datasets/pile/huggingface"

# Training hyperparameters (sweep these)
batch_size: 64
learning_rate: 1e-4
optimizer: "adam"  # "adam" or "sgd"

# Training settings
total_steps: 2000 #10000
warmup_steps: 0 #100
weight_decay: 0.0 #0.01
lr_scheduler_type: "constant"  # "constant", "linear", "cosine", etc.
max_grad_norm: -1  # -1 or 0 to disable gradient clipping
max_length: 256
eval_steps: 500
eval_samples: 1000

# Hessian analysis settings
hessian_eval_interval: 20
hessian_batch_size: 64  # Reduced for Pythia-70M memory; can use 64 for tinystories
top_k: 5 #20 # Lanczos 50
max_iter_multiplier: 4  # MAX_ITER = top_k * this
slq_iter: 3 #200  #200
min_fit_index: 20

# Analysis settings
eigenvalue_indices: [1, 2, 4, 8, 16, 32, 64, 128]
lanczos_indices: [1, 2, 4]
eigenvalue_source: "slq_interp"

# Plot settings
plot_xlim: [1e-1, 1e8]  # Extended for Pythia-70M (~70M params)
plot_ylim: [1e-3, 1e5]

# Hydra settings
hydra:
  job:
    chdir: true  # Change to output directory
  run:
    dir: outputs/${hydra.job.name}/${model_id}_${dataset_name}_bs${batch_size}_lr${learning_rate}_opt${optimizer}_${lr_scheduler_type}
  sweep:
    dir: outputs/${hydra.job.name}
    subdir: ${model_id}_${dataset_name}_bs${batch_size}_lr${learning_rate}_opt${optimizer}_${lr_scheduler_type}
