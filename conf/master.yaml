# ---------------------- NQS Hyperparameters to sweep ------------------ #

# for sgd, this used to be 1.0 and 0.58; for adam, this used to be 0.1 and 0.7
effective_model_size_factor_multiplier: 1.0 #0.1 # NO LONGER USED
effective_model_size_factor_power: 1.0 #0.7 # NO LONGER USED
lr_adapt_tolerance: 0.05 #0.1 #0.05, 0.001, 0.0001 # NO LONGER USED


use_lr_adapt: false


hydra:
  sweeper:
    params:
      effective_model_size_factor_multiplier: 1.0, 0.3, 0.1, 0.03
      effective_model_size_factor_power: 0.4, 0.5, 0.6, 0.7, 0.8
      lr_adapt_tolerance: 0.05

neural_net: # this is just a dictionary!! not the config yaml neural_net
    #data: opengenome2_local #openwebtext2 #wikitext-103-v1 #infimnist #cifar5m
    data: openwebtext2
    loss: condcrossent
    #model: striped_hyena #pythia #pythia #lama #simplecnn #twolayermlp
    model: pythia
    gpu_count: 4
    # ******************************** #
    #gpu_count:
#seq_len: 2048 #2048
seq_len: 128
#vocab_size: 5 
vocab_size: 3000

# ---------------------------------------- #


test_B: 128 #64 
test_K: 50000 #12500
test_N: 10000000 # 5 Mil = 103Mil/ chin 20 ratio
test_lr: 2.0 #1.0

# Generalize over the following dimensions
test_momentum: 0.0 #0.9
test_lr_schedule: step 
test_step_decay_schedule:
  decay_at: [0.5]
  decay_amt: [1]
  #decay_at: [0.5, 0.75]
  #decay_amt: [0.1, 0.1]


comment: ${neural_net.data}_${neural_net.model}_${chin_opt_method}_${train_data_PF}
job_dir: outputs/runs/ICML/${now:%Y-%m-%d-%H-%M}_${comment}/
nn_archive_file: /mfs1/u/chuning/scale/outputs/nn_archive/nn_archive.csv
nqs_archive_file: /mfs1/u/chuning/scale/outputs/nqs_archive/nqs_archive.csv




