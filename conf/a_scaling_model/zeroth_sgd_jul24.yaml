
_target_: a_scale.scaling_models.zeroth_order_scaling_model
_partial_: true

loss_threshold: 7 #4.5
ignore_small_batches: true

effective_model_size_factor: 0.01 #0.01 #0.1 #1.0 #0.01 
include_embedding_params: false

number_of_initializations: 1024 #1024 #1024
seed: 6
method: "latin_hypercube"

# min, max of search ranges
a_range: [1.15, 1.25] #[1.05, 2.0] #[1.05, 1.5] # [1.05, 3.0] #[1.03, 1.5] #[1.5, 3.0] 
b_range:  [0.95, 1.05] #[0.9, 2.0] # 1.2] #[0.8, 3.0] #[0.8, 1.3] #[1.5, 3.0] 
ma_range: [4.0, 6.0] #[0.5, 100] # 50] #[0.1, 5] #[1.0, 20] #0.001 [0.01, 5] #0.01 [0.5, 100.] # 0.1 [0.1, 50]   #1 [5.0, 100.]   
mb_range: [0.15, 0.25] #[0.05, 20] #[0.3, 50] # small m_b will give larger bias term #[0.01, 1] #[0.1, 5] #[0.001, 0.3] #[0.1, 3] #[0.01, 0.3] #[1.0, 20.] 
c_range: [1.4, 1.5] #[1.0, 1.5] #[0.05, 1.5] 
sigma_range: [2.2, 2.5] #[1.0, 30] #20] #100] #[5.0, 20] #[100.0, 500.0]

gtol: 1e-8

max_steps: 3000 #6000 # 6000 #0000



h_sampler_training: ${samplers.h_sampler_fit_nqs}

neural_net: ${neural_net}

scaling_model_dir: ${job_dir}1_fit_scaling_model/
fitted_nqs_file: ${a_scaling_model.scaling_model_dir}/fitted_nqs.yaml

nn_archive_file: ${nn_archive_file}