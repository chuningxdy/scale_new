
_target_: a_scale.scaling_models.zeroth_order_scaling_model
_partial_: true

loss_threshold: 7.0
ignore_small_batches: true

effective_model_size_factor: 
  - ${effective_model_size_factor_multiplier}
  - ${effective_model_size_factor_power}
  #[1.0, 0.58] #[1.0, 0.58] #[0.1, 0.7] #[1.0, 0.58] #[0.1, 0.7] #[1.0, 0.58] #[0.1, 0.7] #[0.1, 0.7] # 0.01 #0.58 #0.01 #0.01 #0.1 #1.0 #0.01 
include_embedding_params: false # this is disabled!! Embedding params are included!!

number_of_initializations: 2000 #1024 #1024 #1024 #1024
seed: 6
method: "latin_hypercube"

# min, max of search ranges
a_range:  [1.05, 2.5] #[1.15, 1.30] #[1.01, 2.5] #[1.200, 1.201] #[1.15, 1.25] #[1.05, 2.0] #[1.05, 1.5] # [1.05, 3.0] #[1.03, 1.5] #[1.5, 3.0] 
b_range:  [0.6, 2.5] #[0.9, 1.1] #[0.8, 2.5] #[0.460, 0.4601] #[0.4, 0.95] #[0.9, 2.0] # 1.2] #[0.8, 3.0] #[0.8, 1.3] #[1.5, 3.0] 
ma_range: [0.5, 100] #[5.0, 20.0] #[0.5, 100] #[4.0, 10.0] #[0.5, 100] # 50] #[0.1, 5] #[1.0, 20] #0.001 [0.01, 5] #0.01 [0.5, 100.] # 0.1 [0.1, 50]   #1 [5.0, 100.]   
mb_range: [0.05, 20] #[0.1, 10] ##[0.05, 20] #[0.15, 10.0] #[0.05, 20] #[0.3, 50] # small m_b will give larger bias term #[0.01, 1] #[0.1, 5] #[0.001, 0.3] #[0.1, 3] #[0.01, 0.3] #[1.0, 20.] 
c_range: [0.01, 0.3] #[1.0, 1.5] #[1.0, 1.5] #[1.4, 2.5] #[1.0, 1.5] #[0.05, 1.5] 
sigma_range: [0.1, 10] #[1.0, 3.0] #[0.1, 10] #[0.60, 0.61] #20] #100] #[5.0, 20] #[100.0, 500.0]

gtol: 1e-8

max_steps: 5000 #5000 #10000 #10000 #6000 # 6000 #0000
# n_fans = 10


h_sampler_training: ${samplers.h_sampler_fit_nqs}

neural_net: ${neural_net}

scaling_model_dir: ${job_dir}1_fit_scaling_model/
fitted_nqs_file: ${a_scaling_model.scaling_model_dir}/fitted_nqs.yaml

nn_archive_file: ${nn_archive_file}