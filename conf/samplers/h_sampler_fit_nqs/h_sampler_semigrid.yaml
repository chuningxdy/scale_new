_target_: a_scale.sampling.h_sampler_semigrid
_partial_: true


seq_len: 128 # used to calculate total compute used by the samples

rand_key: 6

min_N: 500000
max_N: 2000000 # 1000000
lvls_N: 3



# NOTE B is different: - max B is the base level (occurs more often than min)
min_B: 4
max_B: 64 # 64
lvls_B: 3

min_K: 3750
max_K: 12500 #6250
lvls_K: 3

min_lr: 0.1
max_lr: 0.1
lvls_lr: 10

momentum: 0.0
end_lr: 0.1
lr_schedule: constant
optimizer: sgd

step_decay_schedule:
  decay_at: [0.5]
  decay_amt: [1.0]