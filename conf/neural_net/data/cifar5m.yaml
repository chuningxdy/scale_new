# Configuration for loading the Infinite MNIST dataset

loader:
  _target_: a_scale.nn.datasets.cifar5m.CIFAR5M
  # Set batch size from the training configuration
  batch_size: ${h.B}

# Dataset-specific parameters
# Dimensionality of each input sample (28x28 = 784)
# Number of output classes (digits 0-9)
input_channels: 3
input_height: 32
input_width: 32
input_dim: 3072
output_dim: 10
